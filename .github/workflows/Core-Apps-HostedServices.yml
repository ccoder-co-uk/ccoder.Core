# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Core-Apps-HostedServices

on:
  workflow_dispatch: # Allow running the workflow manually from the GitHub UI
  push:
    branches:
      - 'main'       # Run the workflow when pushing to the main branch
  pull_request:
    branches:
      - '*'          # Run the workflow for all pull requests

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.x
        
    - name: Restore dependencies
      run: dotnet restore src/Apps/HostedServices/HostedServices.csproj
      
    - name: Build
      run: dotnet build --no-restore src/Apps/HostedServices/HostedServices.csproj
      
    - name: Upload Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: Core-Apps-HostedServices
        path: src/Apps/HostedServices/bin/Debug/net9.0/*
