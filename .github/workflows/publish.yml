# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: publish

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  NUGET_DIRECTORY: ${{ github.workspace }}/artifacts/nuget

defaults:
  run:
    shell: pwsh

jobs:
  build-test-pack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout core
        uses: actions/checkout@v4
        with:
          path: ccoder.Core

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Create version number
        id: version
        run: |
          "value=$(Get-Date -Format 'yyyy.M.d.HHmm')" >> $env:GITHUB_OUTPUT

      - name: Restore core package
        run: dotnet restore ccoder.Core/src/cCoder.Core/cCoder.Core.csproj --source https://api.nuget.org/v3/index.json --no-cache

      - name: Restore core tests
        run: dotnet restore ccoder.Core/src/cCoder.Core.Tests/cCoder.Core.Tests.csproj --source https://api.nuget.org/v3/index.json --no-cache

      - name: Restore aggregate web host
        run: dotnet restore ccoder.Core/src/Apps/Web/Web.csproj --source https://api.nuget.org/v3/index.json --no-cache

      - name: Restore hosted services host
        run: dotnet restore ccoder.Core/src/Apps/HostedServices/HostedServices.csproj --source https://api.nuget.org/v3/index.json --no-cache

      - name: Build core package
        run: dotnet build ccoder.Core/src/cCoder.Core/cCoder.Core.csproj -c Release --no-restore /p:Version="${{ steps.version.outputs.value }}"

      - name: Build core tests
        run: dotnet build ccoder.Core/src/cCoder.Core.Tests/cCoder.Core.Tests.csproj -c Release --no-restore /p:Version="${{ steps.version.outputs.value }}"

      - name: Build aggregate web host
        run: dotnet build ccoder.Core/src/Apps/Web/Web.csproj -c Release --no-restore /p:Version="${{ steps.version.outputs.value }}"

      - name: Build hosted services host
        run: dotnet build ccoder.Core/src/Apps/HostedServices/HostedServices.csproj -c Release --no-restore /p:Version="${{ steps.version.outputs.value }}"

      - name: Test
        run: dotnet test ccoder.Core/src/cCoder.Core.Tests/cCoder.Core.Tests.csproj -c Release --no-build

      - name: Pack
        run: |
          New-Item -ItemType Directory -Path "${{ env.NUGET_DIRECTORY }}" -Force | Out-Null
          dotnet pack ccoder.Core/src/cCoder.Core/cCoder.Core.csproj -c Release --no-build --output "${{ env.NUGET_DIRECTORY }}" /p:Version="${{ steps.version.outputs.value }}"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget
          if-no-files-found: error
          retention-days: 7
          path: |
            ${{ env.NUGET_DIRECTORY }}/*.nupkg
            !${{ env.NUGET_DIRECTORY }}/*.snupkg

  publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build-test-pack
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: nuget
          path: ${{ env.NUGET_DIRECTORY }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: NuGet login
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish packages
        run: |
          foreach ($file in (Get-ChildItem "${{ env.NUGET_DIRECTORY }}" -Filter *.nupkg)) {
            dotnet nuget push $file.FullName --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
          }
